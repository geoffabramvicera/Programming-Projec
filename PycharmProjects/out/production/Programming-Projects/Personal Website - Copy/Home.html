            @property --angle{

                animation: 3s spin linear infinite;
            }
            #div1::before{

                opacity: 0.5;
            }
            .hyperlinks{

            }
            a:hover{

                transition: font-size 0.1s ease-in-out;
            }
            #div1 a#hyperlink2{
